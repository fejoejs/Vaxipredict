services:
  - type: web
    name: vaxipredict-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vaxipredict-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://vaxipredict.onrender.com"

  - type: web
    name: vaxipredict-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://vaxipredict-api.onrender.com/api/v1"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: vaxipredict-db
    plan: free
